<VirtualHost *:80>
    DocumentRoot /var/www/html/htdocs

    # Satisfy the hard check in htdocs/index.php:20 without requiring mod_env to set it
    SetEnv HTTP_MOD_ENV 1

    # Tell the bootstrap where includes/ is so it never falls through to the .htaccess-writing path
    SetEnv INCLUDE_PATH /var/www/html/includes/

    <Directory /var/www/html/htdocs>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
